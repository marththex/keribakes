name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint · Type check · Build · Test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-deps
        with:
          path: node_modules
          key: ${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node22-

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: npm install --include=optional

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: Smoke test (HTTP)
        run: |
          RESEND_API_KEY=test TO_EMAIL=test@test.com FROM_EMAIL=from@test.com \
            node dist/server/entry.mjs &
          SERVER_PID=$!
          for i in $(seq 1 15); do
            curl -sf http://localhost:4321/ && break || sleep 1
          done
          curl -sf http://localhost:4321/desserts
          curl -sf http://localhost:4321/about
          curl -sf http://localhost:4321/order
          kill $SERVER_PID

      - name: Dependency audit
        run: npm audit --audit-level=high
        continue-on-error: true
